{% extends "base.html" %}

{% block title %}Inscription - Ynov Access{% endblock %}

{% block content %}
<div class="card-form">
    <div class="card-heading">
        <h2>Créer un compte</h2>
        <p>Ajoute un identifiant, choisis un mot de passe, et le hash sera stocké en base.</p>
    </div>

    <form method="POST" class="stack-form">
        <label>
            <span>Nom d'utilisateur</span>
            <input type="text" name="username" placeholder="ex: alex.dupont" required>
        </label>

        <label>
            <span>Email</span>
            <input type="email" name="email" placeholder="ex: alex@ynov.com" required>
        </label>

        <label>
            <span>Mot de passe</span>
            <input type="password" name="password" placeholder="Choisis un mot de passe solide" required>
        </label>

        <button type="submit" class="primary-btn">Créer le compte</button>
    </form>

    <p class="switch-link">Déjà inscrit ? <a href="{{ url_for('login') }}">Se connecter</a></p>
</div>
{% endblock %}
