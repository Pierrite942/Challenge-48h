<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Services - Yhearts</title>
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="../css/services.css">
</head>
<body>
    <header>
        <div class="header-container">
            <div class="logo">
                <img src="../image/h__6_-removebg-preview.png" alt="Logo">
            </div>
            
            <div class="search-bar">
                <input type="text" placeholder="Rechercher...">
            </div>
            
            <div class="header-actions">
                <a href="login.html" class="btn-inscription">Se connecter</a>
            </div>
            
            <div class="menu-section">
                <button class="menu-btn" id="menuBtn">☰ Menu</button>
                <div class="dropdown-menu" id="menuDropdown">
                    <a href="../index.html">Accueil</a>
                    <a href="login.html">Connexion</a>
                    <a href="services.html">Services</a>
                    <a href="message.html">Message</a>
                    <a href="contact.html">Contact</a>
                </div>
            </div>
        </div>
    </header>

    <main>
        <section class="hero">
            <h1>Services</h1>
            <p>Voici nos services</p>
        </section>

        <section class="section-1">
            <h2>Service 1</h2>
            <p>Description du service 1</p>
        </section>

        <section class="section-2">
            <h2>Service 2</h2>
            <p>Description du service 2</p>
        </section>

        <section class="section-3">
            <h2>Service 3</h2>
            <p>Description du service 3</p>
        </section>
    </main>

    <script>
        const menuBtn = document.getElementById('menuBtn');
        const menuDropdown = document.getElementById('menuDropdown');

        menuBtn.addEventListener('click', function(e) {
            e.stopPropagation();
            menuDropdown.classList.toggle('show');
        });

        document.addEventListener('click', function(e) {
            if (!menuBtn.contains(e.target) && !menuDropdown.contains(e.target)) {
                menuDropdown.classList.remove('show');
            }
        });
    </script>
</body>
</html>
</html>
