<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Messages - Ynook</title>
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="../css/message.css">
</head>
<body>
    <header>
        <div class="header-container">
            <div class="logo">
                <a href="/">
                    <img src="../image/h__6_-removebg-preview.png" alt="Logo du site">
                </a>
            </div>

            <div class="search-bar">
                <input type="text" id="friendSearchInput" placeholder="Rechercher une personne...">
                <div id="friendSearchResults" class="friend-search-results"></div>
            </div>
            
            <div class="header-actions" id="headerActions">
                <a href="/inscription" class="btn-inscription">S'inscrire</a>
            </div>

            <div class="menu-section">
                <button class="menu-btn" id="menuBtn">☰ Menu</button>
                <div class="dropdown-menu" id="menuDropdown">
                    <a href="/">Accueil</a>
                    <a href="/login">Connexion</a>
                    <a href="/services">Services</a>
                    <a href="/message">Message</a>
                    <a href="/contact">Contact</a>
                </div>
            </div>
        </div>
    </header>

    <main class="message-page-main">
        <section class="wa-layout">
            <aside class="wa-sidebar">
                <div class="wa-sidebar-title">Discussions</div>

                <div id="notificationsBox" class="notifications-box">
                    <h3>Notifications</h3>
                    <div id="notificationsList" class="notifications-list">Chargement...</div>
                </div>

                <div id="friendRequestsBox" class="wa-block">
                    <h3>Demandes recues</h3>
                    <div id="friendRequestsList" class="wa-scroll-list">Aucune demande pour le moment.</div>
                </div>

                <div id="friendsBox" class="wa-block">
                    <h3>Mes amis</h3>
                    <div id="friendsList" class="wa-scroll-list">Aucun ami pour le moment.</div>
                </div>
            </aside>

            <section id="messagePanel" class="wa-chat-panel">
                <div class="wa-chat-header" id="messagePanelTitle">Messagerie</div>
                <div id="conversationMessages" class="conversation-messages">
                    <div class="conversation-placeholder">Selectionnez un ami pour discuter.</div>
                </div>
                <div class="conversation-input-row">
                    <input type="text" id="conversationInput" placeholder="Ecrire un message..." disabled>
                    <button id="conversationSendBtn" disabled>Envoyer</button>
                </div>
            </section>
        </section>
    </main>
    <script src="../script.js"></script>
</body>
</html>
