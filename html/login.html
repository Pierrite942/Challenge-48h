<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion - Yhearts</title>
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="../css/login.css">
</head>
<body>
    <header>
        <div class="header-container">
            <div class="logo">
                <a href="/">
                    <img src="../image/h__6_-removebg-preview.png" alt="Logo">
                </a>
            </div>

            <div class="search-bar">
                <input type="text" placeholder="Rechercher...">
            </div>
            
            <div class="header-actions">
                <a href="/inscription" class="btn-inscription">S'inscrire</a>
            </div>

            <div class="menu-section">
                <button class="menu-btn" id="menuBtn">☰ Menu</button>
                <div class="dropdown-menu" id="menuDropdown">
                    <a href="/">Accueil</a>
                    <a href="/login">Connexion</a>
                    <a href="/services">Services</a>
                    <a href="/message">Message</a>
                    <a href="/contact">Contact</a>
                </div>
            </div>
        </div>
    </header>

    <main class="auth-page-main">
        <div class="auth-container" style="max-width: 400px; margin-top: 6rem;">
            <h1>Se connecter</h1>
            <form id="loginForm" action="#" method="POST">
                <div class="form-group">
                    <label for="email">Adresse Email</label>
                    <input type="email" id="email" name="email" required placeholder="votre@email.com">
                </div>
                <div class="form-group">
                    <label for="password">Mot de passe</label>
                    <input type="password" id="password" name="password" required placeholder="••••••••">
                </div>
                <p id="loginMessage" style="margin-bottom: 1rem; font-size: 0.95rem;"></p>
                <button type="submit" class="btn-submit" style="margin-top: 2rem;">Connexion</button>
            </form>
            <div class="auth-links">
                <p>Pas encore de compte ? <a href="/inscription">Créer un compte</a></p>
                <p style="margin-top: 10px;"><a href="#" style="font-size: 0.9em; color: #999; font-weight: normal;">Mot de passe oublié ?</a></p>
            </div>
        </div>
    </main>

    <script>
        // Script pour le menu
        const menuBtn = document.getElementById('menuBtn');
        const menuDropdown = document.getElementById('menuDropdown');

        menuBtn.addEventListener('click', function(e) {
            e.stopPropagation();
            menuDropdown.classList.toggle('show');
        });

        document.addEventListener('click', function(e) {
            if (!menuBtn.contains(e.target) && !menuDropdown.contains(e.target)) {
                menuDropdown.classList.remove('show');
            }
        });

        // Script connexion MySQL
        const loginForm = document.getElementById('loginForm');
        const loginMessage = document.getElementById('loginMessage');
        const apiBase = window.location.origin && window.location.origin.startsWith('http')
            ? window.location.origin
            : 'http://127.0.0.1:5000';

        if (!window.location.origin || !window.location.origin.startsWith('http')) {
            window.location.href = 'http://127.0.0.1:5000/login';
        }

        loginForm.addEventListener('submit', async function (e) {
            e.preventDefault();

            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;

            loginMessage.style.color = '#666';
            loginMessage.textContent = 'Connexion en cours...';

            try {
                const response = await fetch(`${apiBase}/api/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: email, password: password })
                });

                const data = await response.json();
                if (response.ok) {
                    loginMessage.style.color = '#14a44d';
                    loginMessage.textContent = data.message || 'Connexion reussie.';
                    setTimeout(() => {
                        window.location.href = '/';
                    }, 900);
                } else {
                    loginMessage.style.color = '#ec4363';
                    loginMessage.textContent = data.error || 'Erreur de connexion.';
                }
            } catch (err) {
                loginMessage.style.color = '#ec4363';
                loginMessage.textContent = 'Serveur indisponible. Lancez app.py.';
            }
        });
    </script>
</body>
</html>
