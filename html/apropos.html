<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>À propos - Mon Site</title>
    <link rel="stylesheet" href="../style.css">
</head>
<body>
    <!-- HEADER -->
    <header>
        <div class="header-container">
            <!-- Logo à gauche -->
            <div class="logo">
                <img src="../image/h__1_-removebg-preview.png" alt="Logo du site">
            </div>

            <!-- Menu à droite -->
            <div class="menu-section">
                <button class="menu-button" id="menuBtn">☰ Menu</button>
                <div class="menu-dropdown" id="menuDropdown">
                    <a href="../index.html">Accueil</a>
                    <a href="services.html">Services</a>
                    <a href="apropos.html">À propos</a>
                    <a href="contact.html">Contact</a>
                </div>
            </div>
        </div>
    </header>

    <!-- MAIN CONTENT -->
    <main>
        <section class="hero">
            <h1>À propos de nous</h1>
            <p>En savoir plus sur notre histoire et nos valeurs</p>
        </section>
    </main>

    <!-- FOOTER -->
    <footer>
        <p>&copy; 2026 Mon Site. Tous droits réservés.</p>
    </footer>

    <script>
        const menuBtn = document.getElementById('menuBtn');
        const dropdownMenu = document.getElementById('dropdownMenu');

        // Ouvrir/fermer le menu
        menuBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            dropdownMenu.classList.toggle('show');
        });

        // Fermer quand on clique ailleurs
        document.addEventListener('click', () => {
            dropdownMenu.classList.remove('show');
        });

        // Fermer quand on clique sur un lien
        document.querySelectorAll('.dropdown-menu a').forEach(link => {
            link.addEventListener('click', () => {
                dropdownMenu.classList.remove('show');
            });
        });
    </script>
</body>
</html>
