<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ynook - Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="header-container">
            <div class="logo">
                <img src="image/h__6_-removebg-preview.png" alt="Logo">
            </div>

            <div class="search-bar">
                <input type="text" placeholder="Rechercher...">
            </div>

            <div class="header-actions">
                <a href="html/inscription.html" class="btn-inscription">S'inscrire</a>
            </div>

            <div class="menu-section">
                <button class="menu-btn" id="menuBtn">☰ Menu</button>
                <div class="dropdown-menu" id="menuDropdown">
                    <a href="index.html">Accueil</a>
                    <a href="html/login.html">Connexion</a>
                    <a href="html/services.html">Services</a>
                    <a href="html/message.html">Message</a>
                    <a href="html/contact.html">Contact</a>
                </div>
            </div>
        </div>
    </header>

    <main>
        <div class="left-column">
            <section class="section-files">
                <h2>Files</h2>
                <p>Contenu de vos fichiers...</p>
            </section>

            <section class="section-chatbot">
                <h2>💬 Chat Bot</h2>
                <div id="chat-messages">
                    <div class="message bot-message">Bonjour ! Je suis l'IA de Ynook. Comment puis-je vous aider ?</div>
                </div>
                <div class="chat-input-area">
                    <input type="text" id="chat-input" placeholder="Posez une question...">
                    <button id="chat-send-btn">Envoyer</button>
                </div>
            </section>
        </div>

        <section class="section-dashboard">
            <h2>Dashboard</h2>
            <div class="hero">
                <h1>Bienvenue</h1>
                <p>Ceci est la page d'accueil de votre campus</p>
            </div>
        </section>

        <div class="right-column">
            <section class="section-news">
                <h2>News</h2>
            </section>

            <section class="section-message">
                <h2>Message</h2>
            </section>
        </div>
    </main>
    <script src="script.js"></script>
</body>
</html>
