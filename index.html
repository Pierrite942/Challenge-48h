<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ynook - Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="header-container">
            <div class="logo">
                <img src="image/h__1_-removebg-preview.png" alt="Logo">
            </div>

            <div class="search-bar">
                <input type="text" placeholder="Rechercher...">
            </div>
            
            <div class="header-actions">
                <a href="html/inscription.html" class="btn-inscription">S'inscrire</a>
            </div>

            <div class="menu-section">
                <button class="menu-btn" id="menuBtn">☰ Menu</button>
                <div class="dropdown-menu" id="menuDropdown">
                    <a href="index.html">Accueil</a>
                    <a href="html/login.html">Connexion</a>
                    <a href="html/services.html">Services</a>
                    <a href="html/apropos.html">À propos</a>
                    <a href="html/contact.html">Contact</a>
                </div>
            </div>
        </div>
    </header>

    <main>
        <div class="left-column">
            <section class="section-files">
                <h2>Files</h2>
                <p>Contenu de vos fichiers...</p>
            </section>
            
            <section class="section-chatbot">
                <h2>Chat Bot</h2>
                <div id="chat-container">
                    <div id="chat-messages" style="height: 150px; overflow-y: auto; margin-bottom: 10px;">
                        <div class="message bot-message">Bonjour ! Je suis l'IA de Ynook. Comment puis-je vous aider ?</div>
                    </div>
                    <div class="chat-input-area">
                        <input type="text" id="chat-input" placeholder="Posez une question..." style="width: 70%;">
                        <button id="chat-send-btn">Envoyer</button>
                    </div>
                </div>
            </section>
        </div>

        <section class="section-dashboard">
            <h2>Dashboard</h2>
            <div class="hero">
                <h1>Bienvenue</h1>
                <p>Ceci est la page d'accueil de votre campus</p>
            </div>
        </section>

        <div class="right-column">
            <section class="section-news">
                <h2>News</h2>
            </section>
            
            <section class="section-message">
                <h2>Message</h2>
            </section>
        </div>
    </main>

    <script>
        // Gestion du Menu Déroulant
        const menuBtn = document.getElementById('menuBtn');
        const menuDropdown = document.getElementById('menuDropdown');

        menuBtn.addEventListener('click', function(e) {
            e.stopPropagation();
            menuDropdown.classList.toggle('show');
        });

        document.addEventListener('click', function(e) {
            if (!menuBtn.contains(e.target) && !menuDropdown.contains(e.target)) {
                menuDropdown.classList.remove('show');
            }
        });

        // ================= LOGIQUE CHATBOT (CORRIGÉE) =================
        const chatMessages = document.getElementById('chat-messages');
        const chatInput = document.getElementById('chat-input');
        const chatSendBtn = document.getElementById('chat-send-btn');

        function addMessage(text, sender) {
            const msgDiv = document.createElement('div');
            msgDiv.classList.add('message');
            msgDiv.style.margin = "5px 0";
            msgDiv.style.textAlign = sender === 'user' ? 'right' : 'left';
            msgDiv.style.color = sender === 'user' ? '#33e1cf' : 'white';
            msgDiv.textContent = (sender === 'user' ? "Vous : " : "IA : ") + text;
            chatMessages.appendChild(msgDiv);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        async function sendToPython(userText) {
            try {
                // Appel au serveur local Python (app.py)
                const response = await fetch('http://127.0.0.1:5000/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: userText })
                });
                
                const data = await response.json();
                
                if (data.reply) {
                    addMessage(data.reply, 'bot');
                } else {
                    addMessage("Erreur : " + (data.error || "Réponse vide"), 'bot');
                }
            } catch (error) {
                addMessage("Erreur : Le serveur Python n'est pas lancé.", 'bot');
            }
        }

        chatSendBtn.addEventListener('click', () => {
            const text = chatInput.value.trim();
            if (text) {
                addMessage(text, 'user');
                chatInput.value = '';
                sendToPython(text);
            }
        });

        chatInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') chatSendBtn.click();
        });
    </script>
</body>
</html>
