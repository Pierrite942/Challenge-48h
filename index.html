<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mon Site - Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="header-container">
            <div class="logo">
                <img src="image/h__1_-removebg-preview.png" alt="Logo">
            </div>

            <div class="search-bar">
                <input type="text" placeholder="Rechercher...">
            </div>
            
            <div class="header-actions">
                <a href="html/inscription.html" class="btn-inscription">S'inscrire</a>
            </div>

            <div class="menu-section">
                <button class="menu-btn" id="menuBtn">☰ Menu</button>
                <div class="dropdown-menu" id="menuDropdown">
                    <a href="index.html">Accueil</a>
                    <a href="html/login.html">Connexion</a>
                    <a href="html/services.html">Services</a>
                    <a href="html/apropos.html">À propos</a>
                    <a href="html/contact.html">Contact</a>
                </div>
            </div>
        </div>
    </header>

    <main>
        <div class="left-column">
            <section class="section-files">
                <h2>Files</h2>
                <p>Contenu de vos fichiers...</p>
            </section>
            
            <section class="section-chatbot">
                <h2>Chat Bot</h2>
                <div id="chat-container">
                    <div id="chat-messages">
                        <div class="message bot-message">Bonjour ! Je suis l'IA Gemini. Comment puis-je vous aider ?</div>
                    </div>
                    <div class="chat-input-area">
                        <input type="text" id="chat-input" placeholder="Écrivez votre message...">
                        <button id="chat-send-btn">Envoyer</button>
                    </div>
                </div>
            </section>
        </div>

        <section class="section-dashboard">
            <h2>Dashboard</h2>
            <div class="hero">
                <h1>Bienvenue</h1>
                <p>Ceci est la page d'accueil</p>
            </div>
            </section>

        <div class="right-column">
            <section class="section-news">
                <h2>News</h2>
            </section>
            
            <section class="section-message">
                <h2>Message</h2>
            </section>
        </div>
    </main>

    <script>
        const menuBtn = document.getElementById('menuBtn');
        const menuDropdown = document.getElementById('menuDropdown');

        menuBtn.addEventListener('click', function(e) {
            e.stopPropagation();
            menuDropdown.classList.toggle('show');
        });

        document.addEventListener('click', function(e) {
            if (!menuBtn.contains(e.target) && !menuDropdown.contains(e.target)) {
                menuDropdown.classList.remove('show');
            }
        });

        // ================= Chatbot Logic =================
        const chatMessages = document.getElementById('chat-messages');
        const chatInput = document.getElementById('chat-input');
        const chatSendBtn = document.getElementById('chat-send-btn');
        const apiKey = "YAIzaSyBrYM2z5U6k5-zSBuliFFmEdPkHQPC9MlY"; // Clé API Gemini

        function addMessage(text, sender) {
            const msgDiv = document.createElement('div');
            msgDiv.classList.add('message');
            msgDiv.classList.add(sender === 'user' ? 'user-message' : 'bot-message');
            msgDiv.textContent = text;
            chatMessages.appendChild(msgDiv);
            chatMessages.scrollTop = chatMessages.scrollHeight; // Scroll vers le bas
        }

        async function sendToGemini(userText) {
            // Mode Chatbot basique
            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: userText }] }]
                    })
                });
                
                const data = await response.json();
                
                if (data.candidates && data.candidates.length > 0) {
                    const botReply = data.candidates[0].content.parts[0].text;
                    addMessage(botReply, 'bot');
                } else {
                    addMessage("Erreur : l'IA n'a pas pu répondre.", 'bot');
                }
            } catch (error) {
                addMessage("Erreur de connexion à l'API.", 'bot');
            }
        }

        chatSendBtn.addEventListener('click', () => {
            const text = chatInput.value.trim();
            if (text) {
                addMessage(text, 'user');
                chatInput.value = '';
                addMessage("...", 'bot-loading'); // Indicateur de chargement
                sendToGemini(text).then(() => {
                    const loadingMsg = document.querySelector('.bot-loading');
                    if (loadingMsg) loadingMsg.remove();
                });
            }
        });

        chatInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                chatSendBtn.click();
            }
        });
    </script>
</body>
</html>
